<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.jsdelivr.net/npm/vega@5"></script>
    <script src="https://cdn.jsdelivr.net/npm/vega-lite@5"></script>
    <script src="https://cdn.jsdelivr.net/npm/vega-embed@6"></script>
</head>
<body>
  <h1>Data Visualization Assignment 3</h1>
  <h2>ELL8224</h2>
  <h2>PRACHI GARG (2025EEZ8511)</h2>

    <div id="vis"></div>

<script>
const spec = {
  "$schema": "https://vega.github.io/schema/vega-lite/v5.json",

  "hconcat": [

    /* COLUMN 1 */
    {
      "vconcat": [

        /* DONUT CHART (with tooltip) */
        {
          "width": 300, "height": 200,
          "data": {"url": "HW_III.csv", "format": {"type": "csv"}},
          "title": "Donut Chart: Total Sales by Rep",
          "mark": {"type": "arc", "innerRadius": 60},
          "encoding": {
            "theta": {"field": "Total", "type": "quantitative"},
            "color": {"field": "Rep", "type": "nominal"},
            "tooltip": [
              {"field": "Rep", "type": "nominal"},
              {"field": "Total", "type": "quantitative"}
            ]
          }
        },

        /* SCATTER WITH BRUSH */
        {
          "width": 300, "height": 200,
          "data": {"url": "HW_III.csv", "format": {"type": "csv"}},
          "title": "Correlation: Units vs Unit Cost",
          "mark": "point",
          "selection": {
            "brush": {"type": "interval"}
          },
          "encoding": {
            "x": {"field": "Units", "type": "quantitative"},
            "y": {"field": "Unit Cost", "type": "quantitative"},
            "color": {
              "condition": {"selection": "brush", "value": "steelblue"},
              "value": "lightgray"
            }
          }
        }

      ]
    },

    /* COLUMN 2 */
    {
      "vconcat": [

        /* STREAMGRAPH */
        {
          "width": 300, "height": 200,
          "data": {
            "url": "HW_III.csv",
            "format": {"type": "csv"},
            "parse": {"OrderDate": "utc:'%m/%d/%Y'"}
          },
          "title": "Streamgraph: Total over Time by Item",
          "mark": {"type": "area", "interpolate": "basis"},
          "encoding": {
            "x": {"field": "OrderDate", "type": "temporal"},
            "y": {
              "aggregate": "sum",
              "field": "Total",
              "type": "quantitative",
              "stack": "center"
            },
            "color": {"field": "Item", "type": "nominal"}
          }
        },

        /* TRELLIS HISTOGRAM */
        {
          "data": {"url": "HW_III.csv", "format": {"type": "csv"}},
          "title": "Trellis Histogram of Units (with Mean)",
          "facet": {"field": "Item", "type": "nominal"},
          "spec": {
            "width": 120,
            "height": 120,
            "layer": [
              {
                "mark": "bar",
                "encoding": {
                  "x": {"bin": true, "field": "Units", "type": "quantitative"},
                  "y": {"aggregate": "count"}
                }
              },
              {
                "mark": {"type": "rule", "color": "red"},
                "encoding": {
                  "x": {"aggregate": "mean", "field": "Units"}
                }
              }
            ]
          }
        }

      ]
    },

    /* COLUMN 3 */
    {
      "vconcat": [

        /* LINE CHART WITH ZOOM */
        {
          "width": 300, "height": 200,
          "data": {
            "url": "HW_III.csv",
            "format": {"type": "csv"},
            "parse": {"OrderDate": "utc:'%m/%d/%Y'"}
          },
          "title": "Total Sales over Time by Rep",
          "mark": {"type": "line", "point": true},
          "selection": {
            "zoom": {"type": "interval", "bind": "scales"}
          },
          "encoding": {
            "x": {"field": "OrderDate", "type": "temporal"},
            "y": {"field": "Total", "type": "quantitative"},
            "color": {"field": "Rep", "type": "nominal"},
            "tooltip": true
          }
        }

      ]
    }

  ]
};

vegaEmbed("#vis", spec);
</script>

</body>
</html>
