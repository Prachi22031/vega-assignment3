  <!-- OVERVIEW (UNCHANGED) -->
  <h2>Multiview</h2>
  <div id="vis"></div>

  <!-- INDIVIDUAL VISUALIZATIONS -->
  <h2>Individual Visualizations</h2>
  <div id="don_chart"></div>
  <div id="scatter_chart"></div>
  <div id="stream_chart"></div>
  <div id="line_chart"></div>
  <div id="hist_chart"></div>

<script>

/* ================= OVERVIEW (UNCHANGED) ================= */

const spec = {
  "$schema": "https://vega.github.io/schema/vega-lite/v5.json",

  "hconcat": [

    {
      "vconcat": [

        {
          "width": 300, "height": 200,
          "data": {"url": "HW_III.csv", "format": {"type": "csv"}},
          "title": "Donut Chart: Total Sales by Rep",
          "mark": {"type": "arc", "innerRadius": 50},
          "encoding": {
            "theta": {"field": "Total", "type": "quantitative"},
            "color": {"field": "Rep", "type": "nominal"},
            "tooltip": [
              {"field": "Rep", "type": "nominal"},
              {"field": "Total", "type": "quantitative"}
            ]
          }
        },

        {
          "width": 300, "height": 200,
          "data": {"url": "HW_III.csv", "format": {"type": "csv"}},
          "title": "Correlation: Units vs Unit Cost",
          "mark": "point",
          "selection": {
            "brush": {"type": "interval"}
          },
          "encoding": {
            "x": {"field": "Units", "type": "quantitative"},
            "y": {"field": "Unit Cost", "type": "quantitative"},
            "color": {
              "condition": {"selection": "brush", "value": "steelblue"},
              "value": "lightgray"
            }
          }
        }

      ]
    },

    {
      "vconcat": [

        {
          "hconcat": [

            {
              "width": 300, "height": 200,
              "data": {
                "url": "HW_III.csv",
                "format": {"type": "csv"},
                "parse": {"OrderDate": "utc:'%m/%d/%Y'"}
              },
              "title": "Streamgraph: Total over Time by Item",
              "mark": {"type": "area", "interpolate": "basis"},
              "encoding": {
                "x": {"field": "OrderDate", "type": "temporal"},
                "y": {
                  "aggregate": "sum",
                  "field": "Total",
                  "type": "quantitative",
                  "stack": "center"
                },
                "color": {"field": "Item", "type": "nominal"}
              }
            },

            {
              "width": 300, "height": 200,
              "data": {
                "url": "HW_III.csv",
                "format": {"type": "csv"},
                "parse": {"OrderDate": "utc:'%m/%d/%Y'"}
              },
              "title": "Multi-Line Chart: Total Sales over Time by Rep",
              "mark": {"type": "line", "point": true},
              "selection": {
                "zoom": {"type": "interval", "bind": "scales"}
              },
              "encoding": {
                "x": {"field": "OrderDate", "type": "temporal", "axis": {"title": "Date"}},
                "y": {"field": "Total", "type": "quantitative", "axis": {"title": "Total Sales"}},
                "color": {"field": "Rep", "type": "nominal"},
                "tooltip": [
                  {"field": "Rep", "type": "nominal"},
                  {"field": "Total", "type": "quantitative"},
                  {"field": "OrderDate", "type": "temporal"}
                ]
              }
            }

          ]
        },

        {
          "data": {"url": "HW_III.csv", "format": {"type": "csv"}},
          "title": "Trellis Histogram of Units (with Mean)",
          "facet": {"field": "Item", "type": "nominal"},
          "spec": {
            "width": 150,
            "height": 150,
            "layer": [
              {
                "mark": "bar",
                "encoding": {
                  "x": {"bin": true, "field": "Units", "type": "quantitative", "axis": {"title": "Units (Binned)"}},
                  "y": {"aggregate": "count", "type": "quantitative", "axis": {"title": "Count"}}
                }
              },
              {
                "mark": {"type": "rule", "color": "red"},
                "encoding": {
                  "x": {"aggregate": "mean", "field": "Units", "type": "quantitative"}
                }
              }
            ]
          }
        }

      ]
    }

  ]
};

vegaEmbed("#vis", spec);

/* DONUT (same) */
vegaEmbed("#don_chart", {
  "$schema": "https://vega.github.io/schema/vega-lite/v5.json",
  "width": 300, "height": 200,
  "data": {"url": "HW_III.csv", "format": {"type": "csv"}},
  "title": "Donut Chart: Total Sales by Rep",
  "mark": {"type": "arc", "innerRadius": 50},
  "encoding": {
    "theta": {"field": "Total", "type": "quantitative"},
    "color": {"field": "Rep", "type": "nominal"},
    "tooltip": [
      {"field": "Rep", "type": "nominal"},
      {"field": "Total", "type": "quantitative"}
    ]
  }
});

/* SCATTER (ADD BRUSH) */
vegaEmbed("#scatter_chart", {
  "$schema": "https://vega.github.io/schema/vega-lite/v5.json",
  "width": 300, "height": 200,
  "data": {"url": "HW_III.csv", "format": {"type": "csv"}},
  "title": "Correlation: Units vs Unit Cost",
  "mark": "point",
  "selection": {
    "brush": {"type": "interval"}
  },
  "encoding": {
    "x": {"field": "Units", "type": "quantitative"},
    "y": {"field": "Unit Cost", "type": "quantitative"},
    "color": {
      "condition": {"selection": "brush", "value": "steelblue"},
      "value": "lightgray"
    }
  }
});

/* STREAM (same) */
vegaEmbed("#stream_chart", {
  "$schema": "https://vega.github.io/schema/vega-lite/v5.json",
  "width": 300, "height": 200,
  "data": {
    "url": "HW_III.csv",
    "format": {"type": "csv"},
    "parse": {"OrderDate": "utc:'%m/%d/%Y'"}
  },
  "title": "Streamgraph: Total over Time by Item",
  "mark": {"type": "area", "interpolate": "basis"},
  "encoding": {
    "x": {"field": "OrderDate", "type": "temporal"},
    "y": {
      "aggregate": "sum",
      "field": "Total",
      "type": "quantitative",
      "stack": "center"
    },
    "color": {"field": "Item", "type": "nominal"}
  }
});

/* LINE (ADD ZOOM + FULL TOOLTIP) */
vegaEmbed("#line_chart", {
  "$schema": "https://vega.github.io/schema/vega-lite/v5.json",
  "width": 300, "height": 200,
  "data": {
    "url": "HW_III.csv",
    "format": {"type": "csv"},
    "parse": {"OrderDate": "utc:'%m/%d/%Y'"}
  },
  "title": "Multi-Line Chart: Total Sales over Time by Rep",
  "mark": {"type": "line", "point": true},
  "selection": {
    "zoom": {"type": "interval", "bind": "scales"}
  },
  "encoding": {
    "x": {"field": "OrderDate", "type": "temporal", "axis": {"title": "Date"}},
    "y": {"field": "Total", "type": "quantitative", "axis": {"title": "Total Sales"}},
    "color": {"field": "Rep", "type": "nominal"},
    "tooltip": [
      {"field": "Rep", "type": "nominal"},
      {"field": "Total", "type": "quantitative"},
      {"field": "OrderDate", "type": "temporal"}
    ]
  }
});

/* HISTOGRAM (ADD MEAN LINE LAYER) */
vegaEmbed("#hist_chart", {
  "$schema": "https://vega.github.io/schema/vega-lite/v5.json",
  "data": {"url": "HW_III.csv", "format": {"type": "csv"}},
  "title": "Trellis Histogram of Units (with Mean)",
  "facet": {"field": "Item", "type": "nominal"},
  "spec": {
    "width": 150,
    "height": 150,
    "layer": [
      {
        "mark": "bar",
        "encoding": {
          "x": {"bin": true, "field": "Units", "type": "quantitative"},
          "y": {"aggregate": "count", "type": "quantitative"}
        }
      },
      {
        "mark": {"type": "rule", "color": "red"},
        "encoding": {
          "x": {"aggregate": "mean", "field": "Units", "type": "quantitative"}
        }
      }
    ]
  }
});
